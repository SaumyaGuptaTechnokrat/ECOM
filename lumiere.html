<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUMIÈRE — Premium Clothing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.28.4/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --charcoal: #1A1A1A;
      --off-white: #F8F5F0;
      --rose: #C8937A;
      --rose-light: #E8C5B5;
      --sage: #7A9E88;
      --gold: #C9A96E;
      --mid-gray: #6B6B6B;
      --light-gray: #E8E5E0;
      --white: #FFFFFF;
      --error: #C0392B;
      --success: #27AE60;
      --shadow: 0 4px 24px rgba(26,26,26,0.10);
      --shadow-lg: 0 12px 48px rgba(26,26,26,0.18);
      --radius: 2px;
      --radius-lg: 8px;
      --transition: all 0.28s cubic-bezier(0.4,0,0.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--off-white);
      color: var(--charcoal);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--off-white); }
    ::-webkit-scrollbar-thumb { background: var(--rose); border-radius: 3px; }

    /* ── NAVBAR ── */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(248,245,240,0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--light-gray);
      padding: 0 2rem;
      height: 72px;
      display: flex; align-items: center; justify-content: space-between;
      transition: var(--transition);
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem; font-weight: 700; letter-spacing: 4px;
      color: var(--charcoal); cursor: pointer; text-decoration: none;
      user-select: none;
    }
    .nav-logo span { color: var(--rose); }
    .nav-links {
      display: flex; align-items: center; gap: 2.2rem;
      list-style: none;
    }
    .nav-links a, .nav-links button {
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem; font-weight: 500; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--charcoal);
      text-decoration: none; background: none; border: none;
      cursor: pointer; padding: 4px 0;
      position: relative; transition: var(--transition);
    }
    .nav-links a::after, .nav-links button::after {
      content: ''; position: absolute; bottom: -2px; left: 0;
      width: 0; height: 1px; background: var(--rose);
      transition: width 0.28s ease;
    }
    .nav-links a:hover::after, .nav-links button:hover::after,
    .nav-links a.active::after { width: 100%; }
    .nav-links a:hover, .nav-links button:hover { color: var(--rose); }
    .nav-actions {
      display: flex; align-items: center; gap: 1rem;
    }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      color: var(--charcoal); font-size: 1.2rem; padding: 8px;
      border-radius: 50%; transition: var(--transition);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .icon-btn:hover { background: var(--light-gray); color: var(--rose); }
    .badge {
      position: absolute; top: 2px; right: 2px;
      background: var(--rose); color: #fff;
      font-size: 0.6rem; font-weight: 700;
      width: 16px; height: 16px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 8px;
    }
    .hamburger span {
      display: block; width: 22px; height: 2px;
      background: var(--charcoal); transition: var(--transition);
    }
    @media (max-width: 768px) {
      .hamburger { display: flex; }
      .nav-links { display: none; }
      .nav-links.open {
        display: flex; flex-direction: column; gap: 0;
        position: fixed; top: 72px; left: 0; right: 0;
        background: var(--off-white);
        padding: 1.5rem 2rem;
        border-bottom: 1px solid var(--light-gray);
        box-shadow: var(--shadow);
        z-index: 999;
      }
      .nav-links.open li { padding: 0.75rem 0; border-bottom: 1px solid var(--light-gray); }
      .nav-links.open li:last-child { border-bottom: none; }
    }

    /* ── MAIN LAYOUT ── */
    .main-content { padding-top: 72px; min-height: 100vh; }

    /* ── PAGE TRANSITIONS ── */
    .page { animation: fadeIn 0.35s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* ── HERO ── */
    .hero {
      background: var(--charcoal);
      color: var(--off-white);
      min-height: 88vh;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      padding: 4rem 2rem;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #1A1A1A 0%, #2D2420 50%, #1A1A1A 100%);
    }
    .hero-pattern {
      position: absolute; inset: 0; opacity: 0.04;
      background-image: repeating-linear-gradient(45deg, var(--off-white) 0, var(--off-white) 1px, transparent 0, transparent 50%);
      background-size: 20px 20px;
    }
    .hero-content { position: relative; text-align: center; max-width: 800px; }
    .hero-eyebrow {
      font-size: 0.72rem; letter-spacing: 5px; text-transform: uppercase;
      color: var(--rose); margin-bottom: 1.5rem; font-weight: 500;
    }
    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 6.5rem);
      font-weight: 700; line-height: 0.95;
      margin-bottom: 1.5rem;
    }
    .hero-title em { font-style: italic; color: var(--rose); }
    .hero-sub {
      font-size: 1rem; font-weight: 300; color: rgba(248,245,240,0.7);
      max-width: 480px; margin: 0 auto 2.5rem; line-height: 1.7;
    }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: var(--rose); color: #fff;
      padding: 0.9rem 2.4rem; font-size: 0.82rem;
      font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
      border: none; cursor: pointer; border-radius: var(--radius);
      transition: var(--transition); text-decoration: none;
    }
    .btn-primary:hover { background: #b8806a; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(200,147,122,0.4); }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: transparent; color: var(--charcoal);
      padding: 0.9rem 2.4rem; font-size: 0.82rem;
      font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
      border: 2px solid var(--charcoal); cursor: pointer; border-radius: var(--radius);
      transition: var(--transition); text-decoration: none;
    }
    .btn-secondary:hover { background: var(--charcoal); color: var(--off-white); }
    .btn-outline-white {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: transparent; color: var(--off-white);
      padding: 0.9rem 2.4rem; font-size: 0.82rem;
      font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
      border: 1px solid rgba(248,245,240,0.5); cursor: pointer; border-radius: var(--radius);
      transition: var(--transition);
    }
    .btn-outline-white:hover { border-color: var(--off-white); background: rgba(248,245,240,0.1); }

    /* ── SECTION TITLES ── */
    .section-header { text-align: center; margin-bottom: 3rem; }
    .section-eyebrow {
      font-size: 0.72rem; letter-spacing: 4px; text-transform: uppercase;
      color: var(--rose); margin-bottom: 0.75rem; font-weight: 500;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 3rem); font-weight: 700; line-height: 1.15;
    }
    .section-title em { font-style: italic; color: var(--rose); }

    /* ── PRODUCTS PAGE ── */
    .products-page { padding: 3rem 2rem 5rem; max-width: 1400px; margin: 0 auto; }
    .products-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
    }
    .filter-bar {
      display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center;
    }
    .filter-btn {
      background: none; border: 1.5px solid var(--light-gray);
      color: var(--charcoal); padding: 0.5rem 1.2rem;
      font-size: 0.78rem; font-weight: 500; letter-spacing: 1px;
      text-transform: uppercase; cursor: pointer; border-radius: 999px;
      transition: var(--transition);
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--charcoal); color: var(--off-white);
      border-color: var(--charcoal);
    }
    .search-bar {
      display: flex; align-items: center; gap: 0.5rem;
      background: var(--white); border: 1.5px solid var(--light-gray);
      border-radius: 999px; padding: 0.5rem 1rem; min-width: 220px;
    }
    .search-bar input {
      border: none; background: none; outline: none;
      font-family: 'Inter', sans-serif; font-size: 0.85rem; width: 100%;
      color: var(--charcoal);
    }
    .search-bar svg { color: var(--mid-gray); flex-shrink: 0; }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
    }
    .product-card {
      background: var(--white); border-radius: var(--radius-lg);
      overflow: hidden; box-shadow: var(--shadow);
      transition: var(--transition); cursor: pointer; position: relative;
    }
    .product-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }
    .product-img-wrap {
      position: relative; aspect-ratio: 3/4; overflow: hidden;
      background: var(--light-gray);
    }
    .product-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.5s ease;
    }
    .product-card:hover .product-img { transform: scale(1.06); }
    .product-img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; background: linear-gradient(135deg, #f0ece6, #e8e0d8);
    }
    .product-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(26,26,26,0.5) 0%, transparent 60%);
      opacity: 0; transition: var(--transition);
      display: flex; align-items: flex-end; padding: 1.2rem;
    }
    .product-card:hover .product-overlay { opacity: 1; }
    .overlay-actions { display: flex; gap: 0.5rem; width: 100%; }
    .overlay-btn {
      flex: 1; background: var(--white); color: var(--charcoal);
      border: none; padding: 0.7rem; font-size: 0.75rem;
      font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; border-radius: var(--radius); transition: var(--transition);
    }
    .overlay-btn:hover { background: var(--rose); color: #fff; }
    .wish-btn {
      position: absolute; top: 1rem; right: 1rem;
      background: var(--white); border: none; cursor: pointer;
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); transition: var(--transition);
      z-index: 2;
    }
    .wish-btn:hover { transform: scale(1.15); }
    .wish-btn.active svg { fill: var(--rose); stroke: var(--rose); }
    .badge-tag {
      position: absolute; top: 1rem; left: 1rem;
      background: var(--charcoal); color: var(--off-white);
      font-size: 0.65rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; padding: 4px 10px; border-radius: 999px;
      z-index: 2;
    }
    .badge-tag.sale { background: var(--rose); }
    .product-info { padding: 1.2rem 1.2rem 1.4rem; }
    .product-brand {
      font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase;
      color: var(--mid-gray); margin-bottom: 0.3rem;
    }
    .product-name {
      font-family: 'Playfair Display', serif; font-size: 1.1rem;
      font-weight: 600; margin-bottom: 0.5rem; line-height: 1.3;
    }
    .product-price-row {
      display: flex; align-items: center; gap: 0.75rem;
    }
    .product-price {
      font-size: 1rem; font-weight: 600; color: var(--charcoal);
    }
    .product-price-old {
      font-size: 0.85rem; color: var(--mid-gray); text-decoration: line-through;
    }
    .product-rating {
      display: flex; align-items: center; gap: 4px;
      font-size: 0.75rem; color: var(--gold); margin-top: 0.4rem;
    }

    /* ── CART DRAWER ── */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(26,26,26,0.5);
      z-index: 1100; opacity: 0; transition: opacity 0.3s;
      backdrop-filter: blur(4px);
    }
    .drawer-overlay.open { opacity: 1; }
    .cart-drawer {
      position: fixed; top: 0; right: -480px; width: 100%; max-width: 480px;
      height: 100vh; background: var(--white); z-index: 1200;
      display: flex; flex-direction: column;
      transition: right 0.38s cubic-bezier(0.4,0,0.2,1);
      box-shadow: -8px 0 48px rgba(26,26,26,0.18);
    }
    .cart-drawer.open { right: 0; }
    .drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem 1.8rem; border-bottom: 1px solid var(--light-gray);
    }
    .drawer-title {
      font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700;
    }
    .close-btn {
      background: none; border: none; cursor: pointer; font-size: 1.4rem;
      color: var(--mid-gray); padding: 4px; border-radius: 50%;
      transition: var(--transition); display: flex;
    }
    .close-btn:hover { color: var(--charcoal); background: var(--light-gray); }
    .drawer-body { flex: 1; overflow-y: auto; padding: 1.5rem 1.8rem; }
    .cart-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; text-align: center; color: var(--mid-gray); gap: 1rem;
    }
    .cart-empty-icon { font-size: 3.5rem; opacity: 0.4; }
    .cart-item {
      display: flex; gap: 1rem; padding: 1.2rem 0;
      border-bottom: 1px solid var(--light-gray); animation: fadeIn 0.3s ease;
    }
    .cart-item-img {
      width: 90px; height: 110px; border-radius: var(--radius);
      background: var(--light-gray); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; overflow: hidden;
    }
    .cart-item-info { flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
    .cart-item-name {
      font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 600; line-height: 1.3;
    }
    .cart-item-variant { font-size: 0.75rem; color: var(--mid-gray); }
    .cart-item-price { font-size: 0.95rem; font-weight: 600; color: var(--rose); }
    .qty-row { display: flex; align-items: center; gap: 0.5rem; margin-top: auto; }
    .qty-btn {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1.5px solid var(--light-gray); background: none;
      cursor: pointer; font-size: 1rem; display: flex;
      align-items: center; justify-content: center; transition: var(--transition);
    }
    .qty-btn:hover { border-color: var(--charcoal); background: var(--charcoal); color: #fff; }
    .qty-val { font-size: 0.9rem; font-weight: 600; min-width: 20px; text-align: center; }
    .remove-item-btn {
      background: none; border: none; cursor: pointer; color: var(--mid-gray);
      font-size: 0.75rem; margin-left: auto; transition: var(--transition);
      display: flex; align-items: center; gap: 3px;
    }
    .remove-item-btn:hover { color: var(--error); }
    .drawer-footer {
      padding: 1.5rem 1.8rem; border-top: 1px solid var(--light-gray);
      background: var(--off-white);
    }
    .coupon-row {
      display: flex; gap: 0.5rem; margin-bottom: 1.2rem;
    }
    .coupon-input {
      flex: 1; padding: 0.7rem 1rem; border: 1.5px solid var(--light-gray);
      border-radius: var(--radius); font-family: 'Inter', sans-serif;
      font-size: 0.85rem; outline: none; background: var(--white);
      transition: var(--transition); text-transform: uppercase;
    }
    .coupon-input:focus { border-color: var(--rose); }
    .coupon-btn {
      padding: 0.7rem 1.2rem; background: var(--charcoal); color: #fff;
      border: none; cursor: pointer; border-radius: var(--radius);
      font-size: 0.78rem; font-weight: 600; letter-spacing: 1px;
      text-transform: uppercase; transition: var(--transition);
    }
    .coupon-btn:hover { background: var(--rose); }
    .coupon-msg { font-size: 0.78rem; margin-bottom: 1rem; }
    .coupon-msg.success { color: var(--success); }
    .coupon-msg.error { color: var(--error); }
    .cart-totals { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.2rem; }
    .total-row {
      display: flex; justify-content: space-between;
      font-size: 0.88rem; color: var(--mid-gray);
    }
    .total-row.grand {
      font-size: 1rem; font-weight: 700; color: var(--charcoal);
      padding-top: 0.5rem; border-top: 1.5px solid var(--light-gray);
    }
    .discount-row { color: var(--success); }

    /* ── CHECKOUT ── */
    .checkout-page { padding: 3rem 2rem 5rem; max-width: 1100px; margin: 0 auto; }
    .checkout-grid {
      display: grid; grid-template-columns: 1fr 380px; gap: 3rem;
    }
    @media (max-width: 900px) { .checkout-grid { grid-template-columns: 1fr; } }
    .form-section { margin-bottom: 2rem; }
    .form-section-title {
      font-family: 'Playfair Display', serif; font-size: 1.2rem;
      font-weight: 700; margin-bottom: 1.2rem;
      padding-bottom: 0.75rem; border-bottom: 1.5px solid var(--light-gray);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group.full { grid-column: 1 / -1; }
    .form-label {
      font-size: 0.75rem; font-weight: 600; letter-spacing: 1px;
      text-transform: uppercase; color: var(--mid-gray);
    }
    .form-input, .form-select {
      padding: 0.75rem 1rem; border: 1.5px solid var(--light-gray);
      border-radius: var(--radius); font-family: 'Inter', sans-serif;
      font-size: 0.9rem; outline: none; background: var(--white);
      color: var(--charcoal); transition: var(--transition);
    }
    .form-input:focus, .form-select:focus { border-color: var(--rose); }
    .order-summary-card {
      background: var(--charcoal); color: var(--off-white);
      border-radius: var(--radius-lg); padding: 2rem;
      position: sticky; top: 90px; height: fit-content;
    }
    .order-summary-title {
      font-family: 'Playfair Display', serif; font-size: 1.2rem;
      margin-bottom: 1.5rem; font-weight: 700;
    }
    .summary-item {
      display: flex; justify-content: space-between; gap: 0.5rem;
      font-size: 0.85rem; padding: 0.6rem 0;
      border-bottom: 1px solid rgba(248,245,240,0.12);
    }
    .summary-item:last-of-type { border-bottom: none; }
    .summary-item-name { color: rgba(248,245,240,0.75); flex: 1; }
    .summary-total {
      display: flex; justify-content: space-between;
      font-size: 1.1rem; font-weight: 700;
      margin-top: 1rem; padding-top: 1rem;
      border-top: 1.5px solid rgba(248,245,240,0.2);
    }
    .summary-discount { color: #7BC67E; font-size: 0.82rem; }
    .payment-methods {
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    .payment-option {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.9rem 1rem; border: 1.5px solid var(--light-gray);
      border-radius: var(--radius); cursor: pointer; transition: var(--transition);
    }
    .payment-option:hover, .payment-option.selected {
      border-color: var(--rose); background: rgba(200,147,122,0.06);
    }
    .payment-option input { accent-color: var(--rose); }

    /* ── PROFILE ── */
    .profile-page { padding: 3rem 2rem 5rem; max-width: 800px; margin: 0 auto; }
    .profile-header-card {
      background: var(--charcoal); color: var(--off-white);
      border-radius: var(--radius-lg); padding: 2.5rem;
      display: flex; align-items: center; gap: 2rem;
      margin-bottom: 2rem; flex-wrap: wrap;
    }
    .avatar-circle {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, var(--rose), var(--gold));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 2rem;
      font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .profile-meta h2 {
      font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 0.25rem;
    }
    .profile-meta p { color: rgba(248,245,240,0.7); font-size: 0.9rem; }
    .profile-tabs {
      display: flex; gap: 0; border-bottom: 2px solid var(--light-gray);
      margin-bottom: 2rem; overflow-x: auto;
    }
    .profile-tab {
      padding: 0.85rem 1.5rem; font-size: 0.82rem; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase; color: var(--mid-gray);
      background: none; border: none; cursor: pointer; white-space: nowrap;
      border-bottom: 2.5px solid transparent; margin-bottom: -2px;
      transition: var(--transition);
    }
    .profile-tab:hover { color: var(--charcoal); }

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);

    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3200);
  }, []);
  return (
    <ToastContext.Provider value={addToast}>
      {children}
      <div className="toast-container">
        {toasts.map(t => (

/* ── COUPON SECTION ── */
function CouponSection({ coupon, setCoupon, addToast }) {
  const [code, setCode] = useState('');
  const [msg, setMsg] = useState(null);

  function apply() {
    const c = COUPONS[code.trim().toUpperCase()];
    if (c) {
      setCoupon({ ...c, label: c.label });
      setMsg({ type:'success', text:`✓ ${c.label} applied!` });
      addToast('Coupon applied!', 'success');
    } else {
      setMsg({ type:'error', text:'Invalid coupon code' });
    }
  }
  function remove() { setCoupon(null); setCode(''); setMsg(null); }

  return (
    <div style={{marginBottom:'1rem'}}>
      {!coupon ? (
        <>
          <div className="coupon-row">
            <input className="coupon-input" placeholder="COUPON CODE"
              value={code} onChange={e=>setCode(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&apply()}/>
            <button className="coupon-btn" onClick={apply}>Apply</button>
          </div>
          {msg && <div className={`coupon-msg ${msg.type}`}>{msg.text}</div>}
          <div style={{fontSize:'0.72rem',color:'var(--mid-gray)'}}>
            Try: LUMIERE20 · WELCOME10 · STYLE15 · FLASH30
          </div>
        </>
      ) : (
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
          background:'rgba(39,174,96,0.1)',padding:'0.7rem 1rem',borderRadius:'var(--radius)',
          border:'1px solid rgba(39,174,96,0.3)'}}>
          <span style={{fontSize:'0.82rem',color:'var(--success)',fontWeight:600}}>
            <Icon d={Icons.tag} size={14}/> {coupon.label}
          </span>
          <button onClick={remove} style={{background:'none',border:'none',cursor:'pointer',color:'var(--mid-gray)',fontSize:'0.75rem'}}>
            Remove
          </button>
        </div>
      )}
    </div>
  );
}

/* ── PRODUCTS PAGE ── */
function ProductsPage({ addToCart, wishlist, toggleWishlist }) {
  const [filter, setFilter] = useState('All');
  const [search, setSearch] = useState('');
  const [sort, setSort] = useState('default');

  const categories = ['All','Women','Men','Accessories'];
  let filtered = PRODUCTS
    .filter(p => filter==='All' || p.category===filter)
    .filter(p => p.name.toLowerCase().includes(search.toLowerCase()));
  if (sort==='price-asc') filtered = [...filtered].sort((a,b)=>a.price-b.price);
  if (sort==='price-desc') filtered = [...filtered].sort((a,b)=>b.price-a.price);
  if (sort==='rating') filtered = [...filtered].sort((a,b)=>b.rating-a.rating);

  return (
    <div className="page products-page">
      <div className="section-header" style={{textAlign:'left',marginBottom:'2rem'}}>
        <div className="section-eyebrow">Collection</div>
        <h1 className="page-title">All <em style={{fontStyle:'italic',color:'var(--rose)'}}>Pieces</em></h1>
        <p className="page-subtitle">{filtered.length} items</p>
      </div>
      <div className="products-header">
        <div className="filter-bar">
          {categories.map(c => (
            <button key={c} className={`filter-btn ${filter===c?'active':''}`} onClick={()=>setFilter(c)}>{c}</button>
          ))}
        </div>
        <div style={{display:'flex',gap:'0.75rem',alignItems:'center',flexWrap:'wrap'}}>
          <div className="search-bar">
            <Icon d={Icons.search} size={16}/>
            <input placeholder="Search pieces..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <select className="form-select" style={{padding:'0.5rem 1rem',borderRadius:'999px',fontSize:'0.78rem',minWidth:'140px'}}
            value={sort} onChange={e=>setSort(e.target.value)}>
            <option value="default">Sort: Default</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="rating">Top Rated</option>
          </select>
        </div>
      </div>
      {filtered.length === 0 ? (
        <div className="empty-state">
          <div className="empty-state-icon">🔍</div>
          <h3>No pieces found</h3>
          <p>Try adjusting your search or filters</p>
          <button className="btn-primary" onClick={()=>{setSearch('');setFilter('All');}}>Clear Filters</button>
        </div>

        <div className="products-grid">
          {filtered.map(p => (
            <ProductCard key={p.id} product={p} addToCart={addToCart}
              inWishlist={wishlist.some(w=>w.id===p.id)} onWishlist={()=>toggleWishlist(p)}/>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── CHECKOUT PAGE ── */
function CheckoutPage({ cart, subtotal, discount, shipping, total, placeOrder, user, navigate }) {
  const [step, setStep] = useState(1);
  const [payment, setPayment] = useState('card');
  const [form, setForm] = useState({
    firstName: user?.firstName||'', lastName: user?.lastName||'',
    email: user?.email||'', phone:'', address:'',
    city:'', state:'', pincode:'', country:'India',
    cardNo:'', expiry:'', cvv:'', nameOnCard:'',
  });
  const [errors, setErrors] = useState({});

  if (cart.length === 0) return (
    <div className="empty-state" style={{paddingTop:'8rem'}}>
      <div className="empty-state-icon">🛍️</div>
      <h3>Your bag is empty</h3>
      <p>Add some pieces before checking out</p>
      <button className="btn-primary" onClick={()=>navigate('products')}>Continue Shopping</button>
    </div>
  );

  function validate() {
    const e = {};
    if (!form.firstName.trim()) e.firstName = 'Required';
    if (!form.lastName.trim()) e.lastName = 'Required';
    if (!form.email.includes('@')) e.email = 'Valid email required';
    if (!form.phone.match(/\d{10}/)) e.phone = '10 digit number required';
    if (!form.address.trim()) e.address = 'Required';
    if (!form.city.trim()) e.city = 'Required';
    if (!form.pincode.match(/\d{6}/)) e.pincode = '6 digit pincode';
    setErrors(e);
    return Object.keys(e).length === 0;
  }
  function nextStep() { if (validate()) setStep(2); }

  const inp = (field, placeholder, type='text', cls='') => (
    <div className={`form-group ${cls}`}>
      <label className="form-label">{placeholder}</label>
      <input className="form-input" type={type} placeholder={placeholder}
        value={form[field]} onChange={e=>setForm(f=>({...f,[field]:e.target.value}))}
        style={errors[field]?{borderColor:'var(--error)'}:{}}/>
      {errors[field] && <span style={{fontSize:'0.72rem',color:'var(--error)'}}>{errors[field]}</span>}
    </div>
  );

  return (
    <div className="page checkout-page">
      <div className="section-eyebrow" style={{marginBottom:'0.5rem'}}>Secure Checkout</div>
      <h1 className="page-title" style={{marginBottom:'0.5rem'}}>Almost <em style={{fontStyle:'italic',color:'var(--rose)'}}>There</em></h1>
      {/* Step Indicator */}
      <div style={{display:'flex',gap:'0',marginBottom:'2.5rem',alignItems:'center'}}>
        {['Delivery','Payment'].map((s,i) => (
          <React.Fragment key={s}>
            <div style={{display:'flex',alignItems:'center',gap:'0.5rem',cursor:i===0||step>1?'pointer':'default'}}
              onClick={()=>i===0&&setStep(1)}>
              <div style={{width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',
                background:step>i?'var(--rose)':'var(--light-gray)',
                color:step>i?'#fff':'var(--mid-gray)',fontSize:'0.75rem',fontWeight:700}}>
                {step>i+1?'✓':i+1}
              </div>
              <span style={{fontSize:'0.8rem',fontWeight:step===i+1?700:400,
                color:step===i+1?'var(--charcoal)':'var(--mid-gray)'}}>{s}</span>
            </div>
            {i<1 && <div style={{flex:1,height:1,background:'var(--light-gray)',margin:'0 1rem'}}/>}
          </React.Fragment>
        ))}
      </div>

      <div className="checkout-grid">
        <div>
          {step === 1 && (
            <>
              <div className="form-section">
                <div className="form-section-title">Delivery Information</div>
                <div className="form-grid">
                  {inp('firstName','First Name',undefined,'')}
                  {inp('lastName','Last Name')}
                  {inp('email','Email Address','email','full')}
                  {inp('phone','Phone Number','tel')}
                  {inp('address','Street Address',undefined,'full')}
                  {inp('city','City')}
                  {inp('state','State')}
                  {inp('pincode','PIN Code')}
                </div>
              </div>
              <button className="btn-primary" onClick={nextStep}>
                Continue to Payment <Icon d={Icons.arrow} size={16}/>
              </button>
            </>
          )}
          {step === 2 && (
            <>
              <div className="form-section">
                <div className="form-section-title">Payment Method</div>
                <div className="payment-methods">
                  {[
                    {id:'card', label:'Credit / Debit Card', icon:'💳'},
                    {id:'upi', label:'UPI Payment', icon:'📱'},
                    {id:'cod', label:'Cash on Delivery', icon:'💵'},
                    {id:'netbanking', label:'Net Banking', icon:'🏦'},
                  ].map(opt => (
                    <label key={opt.id} className={`payment-option ${payment===opt.id?'selected':''}`}>
                      <input type="radio" name="payment" value={opt.id}
                        checked={payment===opt.id} onChange={()=>setPayment(opt.id)}/>
                      <span>{opt.icon}</span>
                      <span style={{fontWeight:500,fontSize:'0.9rem'}}>{opt.label}</span>
                    </label>
                  ))}

/* ── AUTH PAGE ── */
function AuthPage({ setUser, navigate, addToast }) {
  const [mode, setMode] = useState('login');
  const [form, setForm] = useState({ firstName:'', lastName:'', email:'', password:'', confirm:'' });
  const [errors, setErrors] = useState({});
  const [showPw, setShowPw] = useState(false);

  function submit() {
    const e = {};
    if (mode==='register') {
      if (!form.firstName.trim()) e.firstName = 'Required';
      if (!form.lastName.trim()) e.lastName = 'Required';
      if (!form.confirm || form.confirm !== form.password) e.confirm = 'Passwords must match';
    }
    if (!form.email.includes('@')) e.email = 'Valid email required';
    if (form.password.length < 6) e.password = 'Min 6 characters';
    setErrors(e);
    if (Object.keys(e).length > 0) return;
    const user = {
      firstName: form.firstName || form.email.split('@')[0],
      lastName: form.lastName || '',
      email: form.email,
      phone: '',
      city: '',
    };
    setUser(user);
    addToast(mode==='login' ? `Welcome back, ${user.firstName}!` : `Welcome to LUMIÈRE, ${user.firstName}!`, 'success');
    navigate('home');
  }

  const inp = (field, placeholder, type='text') => (
    <div className="form-group" style={{marginBottom:'1rem'}}>
      <label className="form-label">{placeholder}</label>
      <div style={{position:'relative'}}>
        <input className="form-input" type={field==='password'||field==='confirm'?(showPw?'text':'password'):type}
          placeholder={placeholder} style={{width:'100%',paddingRight:field==='password'?'2.5rem':'1rem',
            ...(errors[field]?{borderColor:'var(--error)'}:{})}}
          value={form[field]} onChange={e=>setForm(f=>({...f,[field]:e.target.value}))}
          onKeyDown={e=>e.key==='Enter'&&submit()}/>
        {field==='password' && (
          <button onClick={()=>setShowPw(s=>!s)} style={{position:'absolute',right:'0.8rem',top:'50%',transform:'translateY(-50%)',
            background:'none',border:'none',cursor:'pointer',color:'var(--mid-gray)'}}>
            <Icon d={Icons.eye} size={16}/>
          </button>
        )}
      </div>
      {errors[field] && <span style={{fontSize:'0.72rem',color:'var(--error)',marginTop:'2px'}}>{errors[field]}</span>}
    </div>
  );

  return (
    <div className="page auth-page">
      <div className="auth-card">
        <div className="auth-logo">LUMI<span>È</span>RE</div>
        <div className="auth-sub">Premium Clothing, Thoughtfully Made</div>
        <h2 className="auth-title">{mode==='login' ? 'Welcome Back' : 'Create Account'}</h2>
        {mode==='register' && (
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',marginBottom:'0'}}>
            {inp('firstName','First Name')}
            {inp('lastName','Last Name')}
          </div>
        )}
        {inp('email','Email Address','email')}
        {inp('password','Password')}
        {mode==='register' && inp('confirm','Confirm Password')}
        <button className="btn-primary" onClick={submit} style={{width:'100%',justifyContent:'center',marginTop:'0.5rem'}}>
          {mode==='login' ? 'Sign In' : 'Create Account'}
        </button>
        <div className="or-divider">or</div>
        <button onClick={()=>{}} style={{width:'100%',padding:'0.85rem',border:'1.5px solid var(--light-gray)',
          borderRadius:'var(--radius)',background:'none',cursor:'pointer',fontSize:'0.88rem',
          display:'flex',alignItems:'center',justifyContent:'center',gap:'0.75rem',
          fontFamily:'Inter,sans-serif',transition:'var(--transition)'}}>
          <span style={{fontSize:'1.2rem'}}>G</span> Continue with Google
        </button>
        <div className="auth-toggle">
          {mode==='login' ? (
            <>Don't have an account? <button onClick={()=>{setMode('register');setErrors({});}}>Register</button></>
          ) : (
            <>Already a member? <button onClick={()=>{setMode('login');setErrors({});}}>Sign In</button></>
          )}
        </div>
      </div>
    </div>
  );
}

          <div className="form-grid">
            {[['firstName','First Name'],['lastName','Last Name'],['email','Email','email'],['phone','Phone Number','tel'],['city','City']].map(([f,l,t])=>(

                </div>

      )}

      {tab === 'security' && (

          <h3 style={{fontFamily:'Playfair Display,serif',fontSize:'1.15rem',marginBottom:'1.5rem'}}>Change Password</h3>
          <div style={{display:'flex',flexDirection:'column',gap:'1rem',maxWidth:'400px'}}>

                <label className="form-label">{l}</label>

          <h3 style={{fontFamily:'Playfair Display,serif',fontSize:'1.15rem',marginBottom:'1rem'}}>Danger Zone</h3>

              background:'none',cursor:'pointer',borderRadius:'var(--radius)',fontSize:'0.82rem',
